name: M1 published package smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  published-package-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out smoke client
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install smoke client dependencies
        run: npm ci --ignore-scripts

      - name: Call the published MCP fixture
        working-directory: ${{ runner.temp }}
        run: |
          mkdir -p change-trace-public-npm-smoke
          cd change-trace-public-npm-smoke
          node "$GITHUB_WORKSPACE/scripts/smoke-stdio.mjs" \
            npx --yes --package=change-trace-mcp@0.0.0-dev.0 -- change-trace-mcp
